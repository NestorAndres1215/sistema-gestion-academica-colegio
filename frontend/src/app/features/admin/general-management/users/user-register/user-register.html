<div class="container mb-3">
  <app-bread-crumb [items]="breadcrumbs()"></app-bread-crumb>
  <app-page-header [icon]="icon" [title]="title" [subtitle]="subtitle">
  </app-page-header>
  <div class="info-card">
    <form [formGroup]="registerForm" class="register-form">
      <div class="section-header">
        <mat-icon>badge</mat-icon>
        <h3>Datos personales</h3>
      </div>

      <div class="row">
        <div class="col-12 col-sm-6 col-lg-4">
          <div class="field-group">
            <label class="field-label">DNI</label>
            <mat-form-field appearance="outline" class="register-field">
              <input matInput formControlName="dni" maxlength="8" inputmode="numeric">
            </mat-form-field>
          </div>
        </div>

        <div class="col-12 col-sm-6 col-lg-4">
          <div class="field-group">
            <label class="field-label">Nombres</label>
            <mat-form-field appearance="outline" class="register-field">
              <input matInput formControlName="firstName">
            </mat-form-field>
          </div>
        </div>

        <div class="col-12 col-sm-6 col-lg-4">
          <div class="field-group">
            <label class="field-label">Segundo nombre (opcional)</label>
            <mat-form-field appearance="outline" class="register-field">
              <input matInput formControlName="middleName">
            </mat-form-field>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-12 col-sm-6 col-lg-4">
          <div class="field-group">
            <label class="field-label">Apellido paterno</label>
            <mat-form-field appearance="outline" class="register-field">
              <input matInput formControlName="paternalLastName">
            </mat-form-field>
          </div>
        </div>

        <div class="col-12 col-sm-6 col-lg-4">
          <div class="field-group">
            <label class="field-label">Apellido materno (opcional)</label>
            <mat-form-field appearance="outline" class="register-field">
              <input matInput formControlName="maternalLastName">
            </mat-form-field>
          </div>
        </div>

        <div class="col-12 col-sm-6 col-lg-4">
          <div class="field-group">
            <label class="field-label">Teléfono</label>
            <mat-form-field appearance="outline" class="register-field">
              <input matInput type="tel" formControlName="phone" maxlength="9" inputmode="numeric">
            </mat-form-field>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-12 col-sm-6 col-lg-4">
          <div class="field-group">
            <label class="field-label">Fecha de nacimiento</label>
            <mat-form-field appearance="outline" class="register-field">
              <input matInput [matDatepicker]="birthPicker" formControlName="birthDate">
              <mat-datepicker-toggle matSuffix [for]="birthPicker"></mat-datepicker-toggle>
              <mat-datepicker #birthPicker></mat-datepicker>
            </mat-form-field>
          </div>
        </div>

        <div class="col-12 col-sm-6 col-lg-4">
          <div class="field-group">
            <label class="field-label">Género</label>
            <mat-form-field appearance="outline" class="register-field">
              <mat-select formControlName="gender">
                @for (g of generos; track g.value) {
                <mat-option [value]="g.value">
                  {{ g.label }}
                </mat-option>
                }
              </mat-select>
            </mat-form-field>
          </div>
        </div>

        <div class="col-12 col-sm-6 col-lg-4">
          <div class="field-group">
            <label class="field-label">Nacionalidad</label>
            <mat-form-field appearance="outline" class="register-field">
              <mat-select formControlName="nationality">
                @for (n of nacionalidades; track n.value) {
                <mat-option [value]="n.value">
                  {{ n.label }}
                </mat-option>
                }
              </mat-select>
            </mat-form-field>
          </div>
        </div>
      </div>

      <div class="section-header">
        <mat-icon>lock</mat-icon>
        <h3>Datos de la cuenta</h3>
      </div>

      <div class="row">
        <div class="col-12 col-md-6">
          <div class="field-group">
            <label class="field-label">Correo electrónico</label>
            <mat-form-field appearance="outline" class="register-field">
              <input matInput type="email" formControlName="email" autocomplete="off">
            </mat-form-field>
          </div>
        </div>

        <div class="col-12 col-md-6">
          <div class="field-group">
            <label class="field-label">Usuario</label>
            <mat-form-field appearance="outline" class="register-field">
              <input matInput formControlName="username" autocomplete="off">
            </mat-form-field>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-12 col-md-6">
          <div class="field-group">
            <label class="field-label">Contraseña</label>
            <mat-form-field appearance="outline" class="register-field">
              <input matInput [type]="hidePassword() ? 'password' : 'text'" formControlName="password"
                autocomplete="new-password">

              <button mat-icon-button matSuffix type="button" (click)="togglePassword()" tabindex="-1">
                <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
              </button>
            </mat-form-field>
          </div>
        </div>

        <div class="col-12 col-md-6">
          <div class="field-group">
            <label class="field-label">Confirmar contraseña</label>
            <mat-form-field appearance="outline" class="register-field">
              <input matInput [type]="hideConfirmPassword() ? 'password' : 'text'" formControlName="confirmPassword"
                autocomplete="new-password">

              <button mat-icon-button matSuffix type="button" (click)="toggleConfirmPassword()" tabindex="-1">
                <mat-icon>{{ hideConfirmPassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
              </button>
            </mat-form-field>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <app-button label="Limpiar fechas" icon="close" variant="secondary" (clicked)="cancelar()">
        </app-button>
        <app-button label="Registrar" icon="add" variant="primary" (clicked)="operar()">
        </app-button>
      </div>

    </form>
  </div>

</div>
