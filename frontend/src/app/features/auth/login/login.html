

<div class="login-page">
    <div class="login-card">

        <div class="login-header">
            <div class="login-logo">
                @if (logoUrl()) {
                <img [src]="logoUrl()" alt="Logo" class="logo-img">
                } @else {
                <span class="logo-placeholder">{{ inicial }}</span>
                }
            </div>
            <h1 class="login-title">Bienvenido</h1>
            <p class="login-subtitle">Inicia sesión para continuar</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="operar()" class="login-form">
            <div class="field-group">
                <label class="field-label">Usuario o correo electrónico</label>
                <mat-form-field appearance="outline" class="login-field">
                    <input matInput type="email" formControlName="login" autocomplete="email">
                </mat-form-field>
            </div>
            <div class="field-group">
                <label class="field-label">Contraseña</label>
                <mat-form-field appearance="outline" class="login-field">

                    <input matInput [type]="hidePassword() ? 'password' : 'text'" formControlName="password"
                        autocomplete="current-password">
                    <button mat-icon-button matSuffix type="button" (click)="togglePassword()" tabindex="-1">
                        <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
                    </button>

                </mat-form-field>
            </div>
            <div class="login-options">
                <a class="forgot-link">¿Olvidaste tu contraseña?</a>
            </div>

            <button mat-flat-button type="submit" class="login-btn">

                <span>Iniciar sesión</span>

            </button>

        </form>

    </div>
</div>
