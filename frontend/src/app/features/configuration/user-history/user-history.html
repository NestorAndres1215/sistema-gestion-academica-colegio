<div class="container">

  <!-- Breadcrumb -->
  <app-bread-crumb [items]="breadcrumbs()"></app-bread-crumb>

  <!-- Header -->
  <app-page-header
    [icon]="icon"
    [title]="title"
    [subtitle]="subtitle">
  </app-page-header>

  <!-- Filters -->
  <div class="filters-row">

    <!-- Search -->
    <app-search
      [placeholder]="'Buscar por acción, módulo o descripción...'"
      (searchChange)="onSearch($event)">
    </app-search>

    <!-- Date From -->
    <mat-form-field appearance="outline" class="date-field">
      <input
        matInput
        [matDatepicker]="fromPicker"
        placeholder="Desde"
        [ngModel]="dateFrom()"
        (ngModelChange)="onDateFromChange($event)">
      <mat-datepicker-toggle matSuffix [for]="fromPicker"></mat-datepicker-toggle>
      <mat-datepicker #fromPicker></mat-datepicker>
    </mat-form-field>

    <!-- Date To -->
    <mat-form-field appearance="outline" class="date-field">
      <input
        matInput
        [matDatepicker]="toPicker"
        placeholder="Hasta"
        [ngModel]="dateTo()"
        (ngModelChange)="onDateToChange($event)">
      <mat-datepicker-toggle matSuffix [for]="toPicker"></mat-datepicker-toggle>
      <mat-datepicker #toPicker></mat-datepicker>
    </mat-form-field>

    <!-- Clear dates -->
    @if (dateFrom() || dateTo()) {
      <app-button
        label="Limpiar fechas"
        icon="close"
        variant="ghost"
        (clicked)="clearDateFilters()">
      </app-button>
    }

    <!-- Sort -->
    <app-button
      [label]="sort() === 'desc' ? 'Más reciente' : 'Más antiguo'"
      [icon]="sort() === 'desc' ? 'south' : 'north'"
      variant="secondary"
      (clicked)="toggleSortByDate()">
    </app-button>

  </div>

  <!-- Table -->
  <app-table
    [columns]="columns"
    [data]="logs()"
    [showEdit]="false"
    [showDelete]="false">

    <ng-template #cellTemplate let-column="column" let-value="value">

      @if (column === 'date') {
        {{ value | date: 'dd/MM/yyyy HH:mm' }}

      } @else if (column === 'action') {
        <span class="action-badge">{{ value }}</span>

      } @else {
        {{ value }}
      }

    </ng-template>

  </app-table>

  <!-- Pagination -->
<app-pagination
  [totalItems]="totalItems()"
  [currentPage]="currentPage() + 1"
  [pageSize]="pageSize()"
  (pageChange)="onPageChange($event)"
  (pageSizeChange)="onPageSizeChange($event)">
</app-pagination>

</div>
