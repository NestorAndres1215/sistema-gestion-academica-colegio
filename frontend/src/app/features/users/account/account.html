<div class="container">

  <app-bread-crumb [items]="breadcrumbs()"></app-bread-crumb>
  <div class="page-container">

    <div class="account-card">

      <div class="avatar-circle">
        {{ avatarLetter() }}
      </div>

      <h1 class="card-title">Mi cuenta</h1>
      <p class="card-subtitle">Información de tu perfil</p>

      <form [formGroup]="userForm">

        <!-- Usuario -->
        <div class="field-group">

          <label class="field-label">
            <mat-icon>person</mat-icon>
            Usuario
          </label>

          @if (!editMode()) {

          <p class="field-value">
            {{ userForm.value.username }}
          </p>

          } @else {

          <mat-form-field appearance="outline" class="field-input">
            <input matInput formControlName="username" autocomplete="off">
          </mat-form-field>

          }

        </div>

        <!-- Email -->
        <div class="field-group">

          <label class="field-label">
            <mat-icon>mail</mat-icon>
            Correo electrónico
          </label>

          @if (!editMode()) {

          <p class="field-value">
            {{ userForm.value.email }}
          </p>

          } @else {

          <mat-form-field appearance="outline" class="field-input">
            <input matInput type="email" formControlName="email" autocomplete="off">
          </mat-form-field>

          }

        </div>

      </form>

      <!-- BOTONES -->
      @if (!editMode()) {

      <button mat-flat-button class="update-btn" (click)="toggleEdit()">

        <mat-icon>edit</mat-icon>
        Actualizar

      </button>

      } @else {

      <div class="row g-2">

        <div class="col-12 col-sm-6">

          <button mat-stroked-button class="cancel-btn w-100" type="button" (click)="cancelar()">

            Cancelar

          </button>

        </div>

        <div class="col-12 col-sm-6">

          <button mat-flat-button class="save-btn w-100" type="button" (click)="guardar()">

            <mat-icon>check</mat-icon>
            Guardar

          </button>

        </div>

      </div>

      }

    </div>

  </div>

</div>
