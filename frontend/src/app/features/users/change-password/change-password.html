<div class="page-container">

  <div class="account-card">

    <div class="avatar-circle">
      {{ username?.charAt(0)?.toUpperCase() }}
    </div>

    <h1 class="card-title">Cambiar contraseña</h1>
    <p class="card-subtitle">Seguridad de tu cuenta</p>

    <!-- Usuario -->
    <div class="field-group">
      <label class="field-label">
        <mat-icon>person</mat-icon>
        Usuario
      </label>

      <p class="field-value">{{ username }}</p>
    </div>

    <!-- FORMULARIO SOLO EN EDICIÓN -->
    <form [formGroup]="passwordForm">

      @if (editMode) {

      <!-- Contraseña actual -->
      <div class="field-group">
        <label class="field-label">
          <mat-icon>lock</mat-icon>
          Contraseña actual
        </label>

        <mat-form-field appearance="outline" class="field-input">
          <input
            matInput
            [type]="showActual ? 'text' : 'password'"
            formControlName="currentPassword"
            autocomplete="current-password"
          />

          <button mat-icon-button matSuffix type="button" (click)="showActual = !showActual">
            <mat-icon>{{ showActual ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>
      </div>

      <!-- Nueva contraseña -->
      <div class="field-group">
        <label class="field-label">
          <mat-icon>lock</mat-icon>
          Nueva contraseña
        </label>

        <mat-form-field appearance="outline" class="field-input">
          <input
            matInput
            [type]="showNueva ? 'text' : 'password'"
            formControlName="newPassword"
            autocomplete="new-password"
          />

          <button mat-icon-button matSuffix type="button" (click)="showNueva = !showNueva">
            <mat-icon>{{ showNueva ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>
      </div>

      <!-- Confirmar contraseña -->
      <div class="field-group">
        <label class="field-label">
          <mat-icon>lock_reset</mat-icon>
          Confirmar contraseña
        </label>

        <mat-form-field appearance="outline" class="field-input">
          <input
            matInput
            [type]="showConfirmar ? 'text' : 'password'"
            formControlName="confirmNewPassword"
            autocomplete="new-password"
          />

          <button mat-icon-button matSuffix type="button" (click)="showConfirmar = !showConfirmar">
            <mat-icon>{{ showConfirmar ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>
      </div>

      }

    </form>

    <!-- ERROR -->
    @if (error) {
    <div class="error-msg">
      <mat-icon>error_outline</mat-icon>
      {{ error }}
    </div>
    }

    <!-- SUCCESS -->
    @if (success) {
    <div class="success-msg">
      <mat-icon>check_circle</mat-icon>
      Contraseña actualizada correctamente.
    </div>
    }

    <!-- BOTONES -->
    <div class="actions">

      @if (!editMode) {
      <button mat-flat-button class="update-btn" (click)="toggleEdit()">
        <mat-icon>lock</mat-icon>
        Actualizar contraseña
      </button>
      } @else {
      <button mat-stroked-button class="cancel-btn" (click)="cancelar()">
        Cancelar
      </button>

      <button mat-flat-button class="save-btn" (click)="guardar()">
        <mat-icon>check</mat-icon>
        Guardar
      </button>
      }

    </div>

  </div>

</div>
