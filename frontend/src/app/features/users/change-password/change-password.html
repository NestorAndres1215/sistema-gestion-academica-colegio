<div class="container">
  <app-bread-crumb [items]="breadcrumbs()"></app-bread-crumb>

  <div class="page-container">

    <div class="account-card">

      <div class="avatar-circle">
        {{ avatarLetter() }}
      </div>

      <h1 class="card-title">Cambiar contraseña</h1>

      <p class="card-subtitle">Seguridad de tu cuenta</p>

      <!-- Usuario -->
      <div class="field-group">
        <label class="field-label">
          <mat-icon>person</mat-icon>
          Usuario
        </label>

        <p class="field-value">{{ username() }}</p>
      </div>

      <form [formGroup]="passwordForm">

        @if (editMode()) {
        <div class="field-group">
          <label class="field-label">
            <mat-icon>lock</mat-icon>
            Contraseña actual
          </label>
          <mat-form-field appearance="outline" class="field-input">
            <input matInput formControlName="currentPassword" [type]="showActual() ? 'text' : 'password'">
            <button mat-icon-button matSuffix (click)="showActual.set(!showActual())">
              <mat-icon>{{ showActual() ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </mat-form-field>
        </div>
        <div class="field-group">
          <label class="field-label">
            <mat-icon>lock</mat-icon>
            Nueva contraseña
          </label>
          <mat-form-field appearance="outline" class="field-input">
            <input matInput formControlName="newPassword" [type]="showNueva() ? 'text' : 'password'">
            <button mat-icon-button matSuffix (click)="showNueva.set(!showNueva())">
              <mat-icon>{{ showNueva() ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </mat-form-field>
        </div>

        <div class="field-group">
          <label class="field-label">
            <mat-icon>lock</mat-icon>
            Confirmar nueva contraseña
          </label>
          <mat-form-field appearance="outline" class="field-input">
            <input matInput formControlName="confirmNewPassword" [type]="showConfirmar() ? 'text' : 'password'">
            <button mat-icon-button matSuffix (click)="showConfirmar.set(!showConfirmar())">
              <mat-icon>{{ showConfirmar() ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </mat-form-field>
        </div>
        }

      </form>

      <!-- BOTONES -->

      @if (!editMode()) {
      <app-button label="Actualizar contraseña" icon="edit" variant="primary" (clicked)="toggleEdit()">
      </app-button>
      } @else {
      <div class="row g-2">

        <div class="col-12 col-md-6">
          <app-button label="Cancelar" icon="close" variant="secondary" (clicked)="cancelar()">
          </app-button>
        </div>

        <div class="col-12 col-md-6">
          <app-button label="Guardar" icon="save" variant="primary" (clicked)="guardar()">
          </app-button>
        </div>
      </div>
      }



    </div>

  </div>
</div>
