<div class="chart-card">
  @if (title()) {
    <div class="chart-card__header">
      @if (icon()) {
        <mat-icon class="chart-card__icon">{{ icon() }}</mat-icon>
      }
      <h3>{{ title() }}</h3>
    </div>
  }
  <div class="chart-wrap" [style.height.px]="height()">
    <canvas
      baseChart
      [data]="chartData()"
      [options]="chartOptions"
      type="doughnut">
    </canvas>
  </div>
</div>
