<div class="nf">
  <div class="nf__glow"></div>

  <div class="nf__route" aria-hidden="true">
    <span class="nf__dot"></span>
    <span class="nf__line"></span>
    <span class="nf__dot"></span>
    <span class="nf__line nf__line--broken"></span>
    <span class="nf__dot nf__dot--off"></span>
  </div>

  <div class="nf__icon">
    <mat-icon>signpost</mat-icon>
  </div>

  <div class="nf__code">
    <span>4</span><span>0</span><span>4</span>
  </div>

  <h1 class="nf__title">
    {{ title() }}
  </h1>

  <p class="nf__subtitle">
    {{ subtitle() }}
  </p>

  <app-button 
    [label]="buttonLabel()"
    [icon]="buttonIcon()"
    variant="secondary"
    (clicked)="goHome()">
  </app-button>

</div>
