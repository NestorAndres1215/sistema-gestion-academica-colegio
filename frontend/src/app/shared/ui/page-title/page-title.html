<mat-card class="welcome-banner">
  <mat-card-content>
    <div
      class="welcome-title d-flex flex-column flex-md-row align-items-center justify-content-center justify-content-md-start text-center text-md-start gap-2 flex-wrap">

      <i [class]="icon() + ' gradient-icon'"></i>

      <h1 class="gradient-title mb-0">
        {{ title() }}
      </h1>

    </div>
  </mat-card-content>
</mat-card>
